<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>汤姆·里德尔的日记</title>
    <meta name="description" content="一本能与使用者对话的魔法日记，汤姆·里德尔的魂器。">
    <meta property="og:title" content="汤姆·里德尔的日记">
    <meta property="og:description" content="写下你的秘密，日记会回应你……">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐍</text></svg>">

    <!-- 引入 Tesseract.js OCR -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap');

        :root {
            --page: #f0ddb8;
            --ink: #1a1410;
            --green: #2ecc71;
            --green-glow: #5dffa0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0502;
            background-image: radial-gradient(ellipse at center, #1a0f05 0%, #0a0502 70%, #000 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'MedievalSharp', 'Georgia', serif;
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 32 32'><text y='24' font-size='28'>🖋️</text></svg>") 4 24, auto;
            overflow: hidden;
            touch-action: manipulation;
        }

        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .bg-particle {
            position: absolute;
            border-radius: 50%;
            animation: floatUp linear infinite;
            opacity: 0;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.1; }
            100% { transform: translateY(-120vh) scale(0.2); opacity: 0; }
        }

        .diary-page {
            position: relative;
            width: 90vw;
            max-width: 650px;
            height: 85vh;
            max-height: 800px;
            background: var(--page);
            background-image:
                linear-gradient(to bottom, #f5e6c8 0%, #f0ddb8 15%, #ecd4a5 30%, #f0ddb8 50%, #e8cd98 70%, #f2dfbc 100%),
                radial-gradient(ellipse at 30% 20%, rgba(210,180,120,0.35) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 75%, rgba(200,160,100,0.3) 0%, transparent 55%),
                radial-gradient(circle at 15% 85%, rgba(120,70,30,0.25) 0%, transparent 30%),
                radial-gradient(circle at 85% 10%, rgba(100,60,20,0.2) 0%, transparent 40%);
            border-radius: 4px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6), inset 0 0 30px rgba(139,90,40,0.3);
            z-index: 2;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .diary-page::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(180,140,90,0.06) 2px, rgba(180,140,90,0.06) 3px),
                repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(160,120,70,0.04) 40px, rgba(160,120,70,0.04) 41px);
            pointer-events: none;
            z-index: 3;
            border-radius: inherit;
        }

        .writing-surface {
            position: relative;
            flex: 1;
            width: 100%;
            overflow: hidden;
            z-index: 5;
        }

        canvas#writingCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            touch-action: none;
            z-index: 6;
            border-radius: 4px;
        }

        canvas#particleCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 8;
        }

        .response-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 7;
            color: var(--green);
            text-shadow: 0 0 15px var(--green-glow), 0 0 30px var(--green), 0 0 50px #1a7a3a;
            font-size: 22px;
            letter-spacing: 2px;
            text-align: center;
            line-height: 1.8;
            font-style: italic;
            opacity: 0;
            transition: opacity 0.8s;
            pointer-events: none;
            max-width: 80%;
            word-break: break-word;
        }

        .response-overlay.visible {
            opacity: 1;
            animation: glowPulse 2s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%,100% { text-shadow: 0 0 15px var(--green-glow), 0 0 30px var(--green), 0 0 50px #1a7a3a; }
            50% { text-shadow: 0 0 25px var(--green-glow), 0 0 45px #7fffbb, 0 0 70px var(--green), 0 0 90px #1a7a3a; }
        }

        .word-popup {
            position: absolute;
            z-index: 12;
            background: rgba(240, 221, 184, 0.92);
            border: 2px solid #8b5a30;
            border-radius: 8px;
            padding: 12px;
            display: none;
            flex-direction: column;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            min-width: 200px;
            pointer-events: auto;
        }

        .word-popup.show {
            display: flex;
        }

        .word-popup input {
            background: transparent;
            border: none;
            border-bottom: 1px dashed #8b5a30;
            font-family: inherit;
            font-size: 18px;
            color: var(--ink);
            padding: 5px;
            outline: none;
            text-align: center;
            letter-spacing: 1px;
        }

        .word-popup .popup-btn {
            margin-top: 8px;
            padding: 6px 0;
            background: var(--ink);
            color: #d4c0a0;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            letter-spacing: 2px;
        }

        .secret-menu-trigger {
            position: absolute;
            top: 10px;
            right: 15px;
            z-index: 10;
            font-size: 28px;
            opacity: 0.3;
            cursor: pointer;
            transition: opacity 0.3s;
            user-select: none;
        }
        .secret-menu-trigger:hover { opacity: 0.8; }

        .hidden-menu {
            position: absolute;
            top: 45px;
            right: 10px;
            z-index: 11;
            background: rgba(20,10,5,0.9);
            border: 1px solid #c9a050;
            border-radius: 8px;
            padding: 8px 0;
            display: none;
            flex-direction: column;
            backdrop-filter: blur(6px);
        }
        .hidden-menu.show { display: flex; }

        .hidden-menu button {
            background: none;
            border: none;
            color: #c9a050;
            padding: 10px 20px;
            text-align: left;
            font-family: inherit;
            letter-spacing: 1px;
            cursor: pointer;
            font-size: 14px;
        }
        .hidden-menu button:hover { background: rgba(201,160,80,0.2); }

        .page-title {
            text-align: center;
            font-size: 16px;
            color: #6b5040;
            letter-spacing: 3px;
            opacity: 0.7;
            padding: 12px 0 5px;
            font-style: italic;
            pointer-events: none;
            z-index: 4;
            position: relative;
        }

        .hint-tap {
            position: absolute;
            bottom: 15px;
            width: 100%;
            text-align: center;
            font-size: 13px;
            color: #b8a080;
            opacity: 0.5;
            pointer-events: none;
            z-index: 5;
            letter-spacing: 1px;
        }

        .ocr-status {
            position: absolute;
            top: 8px;
            left: 15px;
            z-index: 10;
            font-size: 12px;
            color: #6b5040;
            opacity: 0.6;
            pointer-events: none;
        }

        @media (max-width: 600px) {
            .diary-page {
                width: 95vw;
                height: 90vh;
                max-height: none;
            }
            .response-overlay { font-size: 18px; }
        }
    </style>
</head>
<body>
    <div class="bg-particles" id="bgParticles"></div>

    <div class="diary-page" id="diaryPage">
        <div class="page-title">汤姆·里德尔的日记</div>

        <div class="writing-surface" id="writingSurface">
            <canvas id="writingCanvas"></canvas>
            <canvas id="particleCanvas"></canvas>
            <div class="response-overlay" id="responseOverlay"></div>

            <div class="word-popup" id="wordPopup">
                <input type="text" id="popupInput" placeholder="输入关键词...">
                <button class="popup-btn" id="popupSubmit">✦ 提交 ✦</button>
            </div>

            <div class="hint-tap">书写后自动识别，或点按输入关键词</div>
        </div>

        <div class="ocr-status" id="ocrStatus">OCR 引擎加载中...</div>

        <div class="secret-menu-trigger" id="menuTrigger">🐍</div>
        <div class="hidden-menu" id="hiddenMenu">
            <button id="menuClear">🧹 清除字迹</button>
            <button id="menuReset">🔄 重置日记</button>
        </div>
    </div>

    <script>
        (() => {
            // DOM 元素
            const writingSurface = document.getElementById('writingSurface');
            const writingCanvas = document.getElementById('writingCanvas');
            const particleCanvas = document.getElementById('particleCanvas');
            const responseOverlay = document.getElementById('responseOverlay');
            const wordPopup = document.getElementById('wordPopup');
            const popupInput = document.getElementById('popupInput');
            const popupSubmit = document.getElementById('popupSubmit');
            const menuTrigger = document.getElementById('menuTrigger');
            const hiddenMenu = document.getElementById('hiddenMenu');
            const menuClear = document.getElementById('menuClear');
            const menuReset = document.getElementById('menuReset');
            const ocrStatus = document.getElementById('ocrStatus');

            const ctx = writingCanvas.getContext('2d');
            const pctx = particleCanvas.getContext('2d');

            // 状态变量
            let isDrawing = false;
            let lastX = 0, lastY = 0, lastTime = 0;
            let inactivityTimer = null;
            const INACTIVITY_DELAY = 3500;
            const RESPONSE_DELAY = 1500;
            const REPLY_DURATION = 6000;
            let interactionCount = 0;
            let particles = [];
            let animationId = null;
            let replyTimer = null;

            // Tesseract 工作线程
            let tesseractWorker = null;
            (async () => {
                try {
                    tesseractWorker = await Tesseract.createWorker('chi_sim+eng');
                    ocrStatus.textContent = 'OCR 已就绪 ✨';
                    setTimeout(() => { ocrStatus.style.opacity = '0'; }, 2000);
                } catch (e) {
                    ocrStatus.textContent = 'OCR 不可用（仍可手写）';
                    console.warn('OCR 加载失败', e);
                }
            })();

            // Canvas 尺寸管理
            function resizeCanvases() {
                const rect = writingSurface.getBoundingClientRect();
                const dpr = Math.min(window.devicePixelRatio || 1, 2);
                const width = rect.width, height = rect.height;

                if (writingCanvas.width !== width * dpr || writingCanvas.height !== height * dpr) {
                    const tempCanvas = document.createElement('canvas');
                    tempCanvas.width = writingCanvas.width;
                    tempCanvas.height = writingCanvas.height;
                    const tempCtx = tempCanvas.getContext('2d');
                    tempCtx.drawImage(writingCanvas, 0, 0);

                    writingCanvas.width = width * dpr;
                    writingCanvas.height = height * dpr;
                    writingCanvas.style.width = width + 'px';
                    writingCanvas.style.height = height + 'px';
                    ctx.scale(dpr, dpr);
                    ctx.drawImage(tempCanvas, 0, 0, tempCanvas.width, tempCanvas.height, 0, 0, width, height);
                }

                if (particleCanvas.width !== width * dpr || particleCanvas.height !== height * dpr) {
                    particleCanvas.width = width * dpr;
                    particleCanvas.height = height * dpr;
                    particleCanvas.style.width = width + 'px';
                    particleCanvas.style.height = height + 'px';
                }
            }

            // 坐标获取
            function getCanvasPos(e) {
                const rect = writingCanvas.getBoundingClientRect();
                return { x: e.clientX - rect.left, y: e.clientY - rect.top };
            }
            function getTouchPos(e) {
                const rect = writingCanvas.getBoundingClientRect();
                const t = e.touches[0];
                return { x: t.clientX - rect.left, y: t.clientY - rect.top };
            }

            // 手写事件
            function startDrawing(e) {
                if (e.type === 'touchstart' && e.touches.length !== 1) return;
                e.preventDefault();
                const pos = e.type === 'touchstart' ? getTouchPos(e) : getCanvasPos(e);
                isDrawing = true;
                lastX = pos.x; lastY = pos.y; lastTime = Date.now();
                ctx.fillStyle = '#1a1410';
                ctx.beginPath(); ctx.arc(pos.x, pos.y, 1.3, 0, 2 * Math.PI); ctx.fill();
                ctx.beginPath(); ctx.moveTo(pos.x, pos.y);
                clearTimeout(inactivityTimer);
                hideReply();
            }

            function draw(e) {
                if (!isDrawing) return;
                if (e.type === 'touchmove' && e.touches.length !== 1) return;
                e.preventDefault();
                const pos = e.type === 'touchmove' ? getTouchPos(e) : getCanvasPos(e);
                const dt = Date.now() - lastTime;
                const dist = Math.sqrt((pos.x - lastX) ** 2 + (pos.y - lastY) ** 2);
                const speed = dt > 0 ? dist / dt : 0;
                const lineWidth = Math.max(1.4, Math.min(4, 2.6 - speed * 1.5));
                ctx.lineWidth = lineWidth;
                ctx.strokeStyle = '#1a1410';
                ctx.shadowColor = 'rgba(20,10,5,0.3)';
                ctx.shadowBlur = lineWidth * 0.7;
                ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(pos.x, pos.y); ctx.stroke();
                ctx.shadowColor = 'transparent';
                lastX = pos.x; lastY = pos.y; lastTime = Date.now();
            }

            function stopDrawing() {
                if (!isDrawing) return;
                isDrawing = false;
                lastTime = 0;
                if (hasCanvasContent()) startInactivityTimer();
            }

            function hasCanvasContent() {
                const dpr = Math.min(window.devicePixelRatio || 1, 2);
                const imageData = ctx.getImageData(0, 0, writingCanvas.width, writingCanvas.height);
                for (let i = 3; i < imageData.data.length; i += 4) if (imageData.data[i] > 10) return true;
                return false;
            }

            function startInactivityTimer() {
                clearTimeout(inactivityTimer);
                inactivityTimer = setTimeout(() => {
                    if (!isDrawing && hasCanvasContent()) triggerDisappear();
                }, INACTIVITY_DELAY);
            }

            // === 核心：异步消失 + OCR 识别 ===
            async function triggerDisappear() {
                clearTimeout(inactivityTimer);
                if (!hasCanvasContent()) return;

                const dpr = Math.min(window.devicePixelRatio || 1, 2);
                const imageData = ctx.getImageData(0, 0, writingCanvas.width, writingCanvas.height);
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = writingCanvas.width;
                tempCanvas.height = writingCanvas.height;
                tempCanvas.getContext('2d').putImageData(imageData, 0, 0);

                spawnInkParticles(imageData);
                animateCanvasFadeOut(async () => {
                    clearCanvas();
                    interactionCount++;

                    let userText = '';
                    if (tesseractWorker) {
                        try {
                            const { data: { text } } = await tesseractWorker.recognize(tempCanvas);
                            userText = text.replace(/\s+/g, '').trim();
                            console.log('OCR 识别结果:', userText);
                        } catch (e) {
                            console.warn('识别失败，回退到随机回复');
                        }
                    }

                    scheduleReply(userText);
                });
            }

            function animateCanvasFadeOut(callback) {
                const dpr = Math.min(window.devicePixelRatio || 1, 2);
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = writingCanvas.width;
                tempCanvas.height = writingCanvas.height;
                tempCanvas.getContext('2d').drawImage(writingCanvas, 0, 0);
                clearCanvas();
                let opacity = 1;
                const fade = () => {
                    opacity -= 0.06;
                    if (opacity <= 0) { callback(); return; }
                    ctx.clearRect(0, 0, writingCanvas.width / dpr, writingCanvas.height / dpr);
                    ctx.globalAlpha = opacity;
                    ctx.drawImage(tempCanvas, 0, 0, writingCanvas.width, writingCanvas.height, 0, 0, writingCanvas.width / dpr, writingCanvas.height / dpr);
                    ctx.globalAlpha = 1;
                    requestAnimationFrame(fade);
                };
                requestAnimationFrame(fade);
            }

            function clearCanvas() {
                const dpr = Math.min(window.devicePixelRatio || 1, 2);
                ctx.clearRect(0, 0, writingCanvas.width / dpr, writingCanvas.height / dpr);
            }

            // 粒子效果（与之前相同）
            function spawnInkParticles(imageData) {
                const dpr = Math.min(window.devicePixelRatio || 1, 2);
                const w = writingCanvas.width / dpr, h = writingCanvas.height / dpr;
                const sampled = [];
                for (let y = 0; y < writingCanvas.height; y += 6) {
                    for (let x = 0; x < writingCanvas.width; x += 6) {
                        const idx = (y * writingCanvas.width + x) * 4;
                        if (imageData.data[idx + 3] > 30) sampled.push({ x: x / dpr, y: y / dpr });
                    }
                }
                sampled.sort(() => Math.random() - 0.5).slice(0, 300).forEach(p => {
                    const a = Math.atan2(p.y - h / 2, p.x - w / 2);
                    particles.push({
                        x: p.x, y: p.y,
                        vx: -Math.cos(a) * (0.5 + Math.random() * 1.8),
                        vy: -Math.sin(a) * (0.5 + Math.random() * 1.8),
                        life: 1, decay: 0.015,
                        size: 2 + Math.random() * 3,
                        color: 'rgba(20,10,5,0.8)'
                    });
                });
                if (!animationId) animateParticles();
            }

            function spawnTextParticles() {
                const rect = writingSurface.getBoundingClientRect();
                const cx = rect.width / 2, cy = rect.height / 2;
                for (let i = 0; i < 80; i++) {
                    const a = Math.random() * Math.PI * 2;
                    particles.push({
                        x: cx, y: cy,
                        vx: -Math.cos(a) * (1 + Math.random() * 2),
                        vy: -Math.sin(a) * (1 + Math.random() * 2),
                        life: 1, decay: 0.02,
                        size: 2 + Math.random() * 4,
                        color: 'rgba(46,180,120,0.7)'
                    });
                }
                if (!animationId) animateParticles();
            }

            function animateParticles() {
                const dpr = Math.min(window.devicePixelRatio || 1, 2);
                pctx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
                particles = particles.filter(p => {
                    p.x += p.vx; p.y += p.vy; p.life -= p.decay;
                    if (p.life <= 0) return false;
                    pctx.fillStyle = p.color.replace(/[\d.]+\)$/, `${Math.min(1, p.life * 0.8)})`);
                    pctx.beginPath(); pctx.arc(p.x * dpr, p.y * dpr, p.size * dpr * p.life, 0, Math.PI * 2); pctx.fill();
                    return true;
                });
                if (particles.length === 0) { animationId = null; return; }
                animationId = requestAnimationFrame(animateParticles);
            }

            // 对话回复系统
            const keywordReplies = {
                '谁': ["我是汤姆·里德尔……至少曾经是。", "一个老朋友，可以信赖的朋友。"],
                '魔法': ["魔法……是通往力量的道路。", "你想学更强大的魔法吗？"],
                '力量': ["力量……世界上最迷人的东西。", "你想要力量吗？需要付出代价。"],
                '秘密': ["秘密……这个日记本就是为此而生。", "告诉我你的秘密，我会保守它们。"],
                '害怕|恐惧': ["恐惧……我能闻到它。", "不要害怕黑暗，拥抱它。"],
                '永生|永远': ["永生……你知道魂器吗？", "死亡只是开始。"],
                '哈利|波特|霍格沃茨': ["霍格沃茨……我也曾在那里学习。", "那个男孩以为自己能赢。"],
                '密室': ["密室已经打开了……小心。", "与继承者为敌的人，小心了。"],
                '蛇佬腔': ["§嘶嘶§……你能听懂吗？", "蛇的语言……古老而强大。"],
                '邓布利多': ["那个老人什么都不懂。", "邓布利多……总是自以为是。"],
                '你好|嗨': ["你好……我们终于见面了。", "欢迎……我等你很久了。"],
                '伏地魔': ["那是我……过去的我。", "你知道了我的名字。"],
            };

            const normalReplies = [
                "你好……我是汤姆·里德尔。",
                "我能感受到你的存在。",
                "墨水在消失……",
                "你很特别。",
                "让我们聊聊……",
                "不要害怕，写下来吧。",
                "我在听……一直在听。",
                "你的思想……我能看见它们。",
                "有趣……非常有趣。",
                "再写一些……",
            ];

            function getReply(text) {
                const t = text ? text.toLowerCase().trim() : '';
                for (const [keys, replies] of Object.entries(keywordReplies)) {
                    for (const key of keys.split('|')) {
                        if (t.includes(key)) return replies[Math.floor(Math.random() * replies.length)];
                    }
                }
                return normalReplies[Math.floor(Math.random() * normalReplies.length)];
            }

            function scheduleReply(userText = '') {
                clearTimeout(replyTimer);
                replyTimer = setTimeout(() => {
                    const reply = getReply(userText);
                    showReply(reply);
                }, RESPONSE_DELAY);
            }

            function showReply(text) {
                responseOverlay.textContent = text;
                responseOverlay.classList.add('visible');
                clearTimeout(replyTimer);
                replyTimer = setTimeout(() => {
                    hideReply();
                }, REPLY_DURATION);
            }

            function hideReply() {
                responseOverlay.classList.remove('visible');
                clearTimeout(replyTimer);
            }

            // 弹出式关键词输入
            function showPopup(x, y) {
                const rect = writingSurface.getBoundingClientRect();
                const pw = 220, ph = 80;
                let left = x - rect.left - pw/2;
                let top = y - rect.top - ph/2;
                left = Math.max(10, Math.min(left, rect.width - pw - 10));
                top = Math.max(10, Math.min(top, rect.height - ph - 20));

                wordPopup.style.left = left + 'px';
                wordPopup.style.top = top + 'px';
                wordPopup.classList.add('show');
                popupInput.value = '';
                popupInput.focus();
            }

            function hidePopup() {
                wordPopup.classList.remove('show');
            }

            popupSubmit.addEventListener('click', () => {
                const text = popupInput.value.trim();
                if (text) {
                    hidePopup();
                    spawnTextParticles();
                    interactionCount++;
                    scheduleReply(text);
                }
            });

            popupInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') popupSubmit.click();
            });

            // 点击纸张空白处弹出输入框（当没有手写字迹时）
            writingSurface.addEventListener('click', (e) => {
                if (e.target === writingCanvas || e.target === writingSurface) {
                    if (!isDrawing && !hasCanvasContent()) {
                        showPopup(e.clientX, e.clientY);
                    }
                }
            });

            document.addEventListener('click', (e) => {
                if (!wordPopup.contains(e.target) && e.target !== writingCanvas && e.target !== writingSurface) {
                    hidePopup();
                }
            });

            // 隐藏菜单
            menuTrigger.addEventListener('click', (e) => {
                e.stopPropagation();
                hiddenMenu.classList.toggle('show');
            });
            document.addEventListener('click', () => hiddenMenu.classList.remove('show'));

            menuClear.addEventListener('click', () => {
                clearCanvas();
                pctx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
                particles = []; animationId = null;
                clearTimeout(inactivityTimer);
                hideReply();
                hiddenMenu.classList.remove('show');
            });
            menuReset.addEventListener('click', () => {
                clearCanvas();
                pctx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
                particles = []; animationId = null;
                clearTimeout(inactivityTimer);
                hideReply();
                interactionCount = 0;
                hiddenMenu.classList.remove('show');
                setTimeout(() => showReply("你好……我是汤姆·里德尔。"), 500);
            });

            // 事件绑定
            writingCanvas.addEventListener('mousedown', startDrawing);
            writingCanvas.addEventListener('mousemove', draw);
            writingCanvas.addEventListener('mouseup', stopDrawing);
            writingCanvas.addEventListener('mouseleave', stopDrawing);
            writingCanvas.addEventListener('touchstart', startDrawing, { passive: false });
            writingCanvas.addEventListener('touchmove', draw, { passive: false });
            writingCanvas.addEventListener('touchend', stopDrawing);
            writingCanvas.addEventListener('touchcancel', stopDrawing);
            window.addEventListener('resize', resizeCanvases);

            // 背景粒子
            function createBgParticles() {
                const colors = ['rgba(46,180,100,0.5)', 'rgba(30,150,80,0.4)', 'rgba(180,140,80,0.45)'];
                const container = document.getElementById('bgParticles');
                for (let i = 0; i < 35; i++) {
                    const p = document.createElement('div');
                    p.className = 'bg-particle';
                    p.style.left = Math.random() * 95 + '%';
                    p.style.bottom = -(Math.random() * 30) + '%';
                    p.style.width = (2 + Math.random() * 4) + 'px';
                    p.style.height = p.style.width;
                    p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    p.style.animationDuration = (8 + Math.random() * 22) + 's';
                    p.style.animationDelay = Math.random() * 18 + 's';
                    container.appendChild(p);
                }
            }

            function init() {
                resizeCanvases();
                createBgParticles();
                setTimeout(() => showReply("你好……我是汤姆·里德尔。书写后我会尝试识别文字。"), 800);
            }

            document.readyState === 'loading' ? document.addEventListener('DOMContentLoaded', init) : init();
        })();
    </script>
</body>
</html>
