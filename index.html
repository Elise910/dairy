<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>汤姆·里德尔的日记 - Tom Riddle's Diary</title>
    <style>
        :root {
            --bg: #0d0a07;
            --cover-dark: #2a1005;
            --cover: #3a1f0d;
            --cover-light: #4a2810;
            --page: #f0ddb8;
            --page-dark: #e5cd9a;
            --page-edge: #d4b87a;
            --ink: #1a1410;
            --ink-light: #3d3228;
            --green: #2ecc71;
            --green-glow: #5dffa0;
            --green-dark: #1a7a3a;
            --gold: #c9a050;
            --spine: #3a1a08;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at center, #1a0f05 0%, #0a0502 70%, #000 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Georgia', 'Times New Roman', 'Songti SC', 'STSong', serif;
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            cursor: default;
        }

        /* 背景魔法粒子 */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .bg-particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            animation: floatUp linear infinite;
            opacity: 0;
        }
        @keyframes floatUp {
            0% {
                transform: translateY(0) translateX(0) scale(1);
                opacity: 0;
            }
            10% {
                opacity: 0.7;
            }
            90% {
                opacity: 0.1;
            }
            100% {
                transform: translateY(-120vh) translateX(40px) scale(0.2);
                opacity: 0;
            }
        }
        @keyframes floatUpAlt {
            0% {
                transform: translateY(0) translateX(0) scale(1);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.05;
            }
            100% {
                transform: translateY(-110vh) translateX(-50px) scale(0.15);
                opacity: 0;
            }
        }

        /* 主容器 */
        .main-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* 日记本 */
        .diary-wrapper {
            perspective: 1200px;
            position: relative;
        }
        .diary {
            display: flex;
            position: relative;
            border-radius: 8px;
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.7),
                0 5px 20px rgba(0, 0, 0, 0.5),
                inset 0 0 0 1px rgba(255, 255, 255, 0.03);
            transform: rotateX(3deg);
            transition: transform 0.6s ease;
        }
        .diary:hover {
            transform: rotateX(1deg);
        }

        /* 左页封面边缘 */
        .page-outer-left {
            background: var(--cover);
            background-image: linear-gradient(135deg, #3d1f0d 0%, #2a1005 40%, #3a1a08 100%);
            border-radius: 8px 2px 2px 8px;
            padding: 6px 4px 6px 8px;
            position: relative;
            box-shadow: -3px 2px 8px rgba(0, 0, 0, 0.5);
        }
        .page-outer-left::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: inherit;
            background: repeating-linear-gradient(0deg,
                    transparent,
                    transparent 3px,
                    rgba(0, 0, 0, 0.03) 3px,
                    rgba(0, 0, 0, 0.03) 4px);
            pointer-events: none;
        }

        /* 右页封面边缘 */
        .page-outer-right {
            background: var(--cover);
            background-image: linear-gradient(315deg, #3d1f0d 0%, #2a1005 40%, #3a1a08 100%);
            border-radius: 2px 8px 8px 2px;
            padding: 6px 8px 6px 4px;
            position: relative;
            box-shadow: 3px 2px 8px rgba(0, 0, 0, 0.5);
        }
        .page-outer-right::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: inherit;
            background: repeating-linear-gradient(0deg,
                    transparent,
                    transparent 3px,
                    rgba(0, 0, 0, 0.03) 3px,
                    rgba(0, 0, 0, 0.03) 4px);
            pointer-events: none;
        }

        /* 书页 */
        .page {
            background: var(--page);
            background-image:
                linear-gradient(to bottom,
                    #f5e6c8 0%, #f0ddb8 15%, #ecd4a5 30%, #f0ddb8 50%, #e8cd98 70%, #f2dfbc 100%),
                radial-gradient(ellipse at 30% 20%, rgba(210, 180, 120, 0.35) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 75%, rgba(200, 160, 100, 0.3) 0%, transparent 55%);
            border-radius: 2px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 30px rgba(139, 90, 40, 0.25);
            transition: all 0.3s ease;
        }
        /* 纸页纹理 */
        .page::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                repeating-linear-gradient(0deg,
                    transparent,
                    transparent 2px,
                    rgba(180, 140, 90, 0.06) 2px,
                    rgba(180, 140, 90, 0.06) 3px),
                repeating-linear-gradient(90deg,
                    transparent,
                    transparent 40px,
                    rgba(160, 120, 70, 0.04) 40px,
                    rgba(160, 120, 70, 0.04) 41px);
            pointer-events: none;
            z-index: 2;
            border-radius: inherit;
        }
        /* 做旧斑点 */
        .page::after {
            content: '';
            position: absolute;
            top: 5%;
            left: 10%;
            width: 60%;
            height: 30%;
            background: radial-gradient(ellipse, rgba(160, 120, 70, 0.2) 0%, transparent 70%);
            pointer-events: none;
            z-index: 1;
            border-radius: 50%;
        }

        /* 左页 */
        .page-left {
            width: 340px;
            min-height: 480px;
            border-radius: 2px 0 0 2px;
            padding: 25px 20px 25px 30px;
            display: flex;
            flex-direction: column;
            z-index: 3;
            position: relative;
        }
        /* 右页 */
        .page-right {
            width: 340px;
            min-height: 480px;
            border-radius: 0 2px 2px 0;
            padding: 25px 30px 25px 20px;
            display: flex;
            flex-direction: column;
            z-index: 3;
            position: relative;
        }

        /* 书脊阴影线 */
        .spine-line {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 3px;
            background: linear-gradient(to right,
                    rgba(0, 0, 0, 0.25),
                    rgba(0, 0, 0, 0.08),
                    rgba(0, 0, 0, 0.2));
            z-index: 10;
            pointer-events: none;
        }
        .page-left .spine-line {
            right: 0;
        }
        .page-right .spine-line {
            left: 0;
        }

        /* 左页标题 */
        .page-left .diary-label {
            text-align: center;
            font-size: 13px;
            color: #6b5040;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-style: italic;
            opacity: 0.7;
        }
        .page-left .diary-owner {
            text-align: center;
            font-size: 15px;
            color: #4a3028;
            letter-spacing: 1px;
            margin-bottom: 20px;
            font-weight: bold;
            border-bottom: 1px solid rgba(100, 70, 40, 0.3);
            padding-bottom: 12px;
        }
        .page-left .response-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 10px;
            position: relative;
            z-index: 5;
        }
        .response-text {
            font-size: 16px;
            color: var(--green);
            text-shadow: 0 0 15px var(--green-glow), 0 0 30px var(--green), 0 0 50px var(--green-dark);
            text-align: center;
            letter-spacing: 1px;
            line-height: 1.8;
            opacity: 0;
            transition: opacity 0.8s ease;
            font-style: italic;
            word-break: break-word;
            padding: 10px;
        }
        .response-text.visible {
            opacity: 1;
            animation: glowPulse 2s ease-in-out infinite;
        }
        @keyframes glowPulse {
            0%,
            100% {
                text-shadow: 0 0 15px var(--green-glow), 0 0 30px var(--green), 0 0 50px var(--green-dark);
            }
            50% {
                text-shadow: 0 0 25px var(--green-glow), 0 0 45px #7fffbb, 0 0 70px var(--green), 0 0 90px var(--green-dark);
            }
        }
        .response-text.easter-egg {
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 3px;
            animation: easterEggGlow 1.5s ease-in-out infinite;
            color: #ff4444;
            text-shadow: 0 0 20px #ff4444, 0 0 40px #ff0000, 0 0 60px #aa0000, 0 0 80px #660000;
        }
        @keyframes easterEggGlow {
            0%,
            100% {
                text-shadow: 0 0 20px #ff4444, 0 0 40px #ff0000, 0 0 60px #aa0000;
                transform: scale(1);
            }
            50% {
                text-shadow: 0 0 35px #ff6666, 0 0 60px #ff2222, 0 0 90px #cc0000, 0 0 120px #880000;
                transform: scale(1.03);
            }
        }

        /* 装饰蛇纹 */
        .snake-decoration {
            position: absolute;
            opacity: 0.06;
            pointer-events: none;
            z-index: 1;
            font-size: 120px;
            color: #3a6b3a;
        }
        .page-left .snake-decoration {
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) rotate(-15deg);
        }
        .page-right .snake-decoration {
            bottom: 30px;
            right: 40px;
            transform: rotate(10deg);
            font-size: 90px;
        }

        /* 右页书写区 */
        .page-right .writing-label {
            text-align: center;
            font-size: 13px;
            color: #6b5040;
            letter-spacing: 2px;
            margin-bottom: 6px;
            font-style: italic;
            opacity: 0.7;
        }
        .canvas-container {
            position: relative;
            flex: 1;
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24'><path d='M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z' fill='%231a1410' opacity='0.7'/></svg>") 2 20,
            crosshair;
            border-radius: 4px;
            position: relative;
            z-index: 5;
            min-height: 250px;
            background: transparent;
            border: 1px dashed rgba(139, 100, 60, 0.25);
            border-radius: 6px;
            transition: border-color 0.4s ease;
        }
        .canvas-container:hover {
            border-color: rgba(139, 100, 60, 0.5);
        }
        .canvas-container.writing {
            border-color: rgba(60, 40, 20, 0.6);
            border-style: solid;
        }
        canvas#writingCanvas {
            width: 100%;
            height: 100%;
            border-radius: 6px;
            touch-action: none;
            position: relative;
            z-index: 6;
        }
        .canvas-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 4;
            color: #b8a080;
            font-size: 15px;
            letter-spacing: 1px;
            font-style: italic;
            text-align: center;
            transition: opacity 0.5s ease;
            opacity: 0.7;
        }
        .canvas-container.writing .canvas-hint {
            opacity: 0.2;
        }

        /* 打字输入区 */
        .text-input-area {
            display: none;
            flex: 1;
            z-index: 5;
            position: relative;
            min-height: 250px;
        }
        .text-input-area.active {
            display: flex;
            flex-direction: column;
        }
        .text-input-area textarea {
            flex: 1;
            background: transparent;
            border: 1px dashed rgba(139, 100, 60, 0.3);
            border-radius: 6px;
            padding: 15px;
            font-family: 'Georgia', 'Times New Roman', 'Songti SC', serif;
            font-size: 16px;
            color: var(--ink);
            resize: none;
            outline: none;
            letter-spacing: 0.5px;
            line-height: 1.8;
            transition: border-color 0.4s ease;
            z-index: 6;
        }
        .text-input-area textarea:focus {
            border-color: rgba(100, 60, 30, 0.6);
            border-style: solid;
        }
        .text-input-area textarea::placeholder {
            color: #c5b090;
            font-style: italic;
        }
        .submit-btn {
            margin-top: 8px;
            padding: 8px 20px;
            background: var(--ink);
            color: #d4c0a0;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Georgia', serif;
            letter-spacing: 2px;
            font-size: 13px;
            transition: all 0.3s ease;
            align-self: center;
            z-index: 6;
        }
        .submit-btn:hover {
            background: #2a1a10;
            color: #f0e0c0;
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.3);
        }

        /* 粒子Canvas覆盖层 */
        .particle-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 15;
            border-radius: 6px;
        }
        canvas#particleCanvas {
            width: 100%;
            height: 100%;
            pointer-events: none;
            border-radius: 6px;
        }

        /* 工具栏 */
        .toolbar {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            z-index: 20;
        }
        .tool-btn {
            padding: 10px 18px;
            background: rgba(30, 15, 5, 0.8);
            color: #c9a050;
            border: 1px solid rgba(201, 160, 80, 0.4);
            border-radius: 25px;
            cursor: pointer;
            font-family: 'Georgia', serif;
            letter-spacing: 1px;
            font-size: 13px;
            transition: all 0.35s ease;
            backdrop-filter: blur(4px);
            position: relative;
            overflow: hidden;
        }
        .tool-btn:hover {
            background: rgba(50, 25, 8, 0.9);
            border-color: rgba(201, 160, 80, 0.8);
            color: #e0c070;
            box-shadow: 0 0 20px rgba(201, 160, 80, 0.25);
            transform: translateY(-2px);
        }
        .tool-btn:active {
            transform: scale(0.95);
            transition: transform 0.1s ease;
        }
        .tool-btn.active-mode {
            background: rgba(46, 150, 80, 0.3);
            border-color: var(--green);
            color: var(--green-glow);
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.3);
        }
        .tool-btn .btn-icon {
            display: inline-block;
            margin-right: 6px;
            font-size: 15px;
        }

        /* 墨水瓶装饰 */
        .inkwell {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 40px;
            height: 50px;
            pointer-events: none;
            z-index: 0;
            opacity: 0.3;
        }
        .inkwell::before {
            content: '🖋️';
            font-size: 40px;
            position: absolute;
            bottom: 0;
            right: 0;
            filter: grayscale(0.8) brightness(0.5);
            animation: inkwellFloat 6s ease-in-out infinite;
        }
        @keyframes inkwellFloat {
            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }
            25% {
                transform: translateY(-8px) rotate(2deg);
            }
            75% {
                transform: translateY(-4px) rotate(-2deg);
            }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .diary {
                flex-direction: column;
                transform: none;
                border-radius: 6px;
            }
            .diary:hover {
                transform: none;
            }
            .page-outer-left {
                border-radius: 6px 6px 0 0;
                padding: 4px 6px 2px 6px;
            }
            .page-outer-right {
                border-radius: 0 0 6px 6px;
                padding: 2px 6px 4px 6px;
            }
            .page-left {
                width: 100%;
                min-height: 180px;
                border-radius: 2px 2px 0 0;
                padding: 18px 15px 12px 15px;
            }
            .page-right {
                width: 100%;
                min-height: 300px;
                border-radius: 0 0 2px 2px;
                padding: 12px 15px 18px 15px;
            }
            .canvas-container {
                min-height: 200px;
            }
            .text-input-area {
                min-height: 200px;
            }
            .page-left .diary-owner {
                margin-bottom: 10px;
                font-size: 13px;
            }
            .page-left .diary-label {
                font-size: 11px;
                margin-bottom: 4px;
            }
            .response-text {
                font-size: 14px;
                padding: 5px;
            }
            .snake-decoration {
                font-size: 60px !important;
            }
            .page-left .snake-decoration {
                bottom: 15px;
                font-size: 50px !important;
            }
            .page-right .snake-decoration {
                bottom: 10px;
                right: 15px;
                font-size: 45px !important;
            }
            .toolbar {
                gap: 8px;
            }
            .tool-btn {
                padding: 8px 12px;
                font-size: 11px;
                letter-spacing: 0.5px;
            }
            .spine-line {
                display: none;
            }
        }
        @media (max-width: 400px) {
            .page-left {
                min-height: 140px;
                padding: 12px 10px 8px 10px;
            }
            .page-right {
                min-height: 240px;
                padding: 8px 10px 12px 10px;
            }
            .canvas-container {
                min-height: 160px;
            }
            .text-input-area {
                min-height: 160px;
            }
            .response-text {
                font-size: 12px;
            }
            .page-left .diary-owner {
                font-size: 11px;
            }
            .tool-btn {
                padding: 6px 10px;
                font-size: 10px;
            }
        }
    </style>
</head>
<body>

    <!-- 背景粒子容器 -->
    <div class="bg-particles" id="bgParticles"></div>

    <!-- 主容器 -->
    <div class="main-container">
        <!-- 日记本 -->
        <div class="diary-wrapper">
            <div class="diary" id="diaryBook">
                <!-- 左页 -->
                <div class="page-outer-left">
                    <div class="page page-left" id="pageLeft">
                        <div class="spine-line"></div>
                        <div class="diary-label">▸ 汤姆·里德尔的日记 ◂</div>
                        <div class="diary-owner">T. M. Riddle</div>
                        <div class="response-area" id="responseArea">
                            <div class="response-text" id="responseText"></div>
                        </div>
                        <div class="snake-decoration">🐍</div>
                    </div>
                </div>

                <!-- 右页 -->
                <div class="page-outer-right">
                    <div class="page page-right" id="pageRight">
                        <div class="spine-line"></div>
                        <div class="writing-label">✍ 在此书写你的秘密...</div>
                        <div class="canvas-container" id="canvasContainer">
                            <canvas id="writingCanvas"></canvas>
                            <canvas id="particleCanvas" class="particle-overlay"></canvas>
                            <div class="canvas-hint" id="canvasHint">用羽毛笔在此书写<br>或切换至打字模式</div>
                        </div>
                        <div class="text-input-area" id="textInputArea">
                            <textarea id="textInput" placeholder="写下你想说的话...&#10;日记会回应你..." rows="5"></textarea>
                            <button class="submit-btn" id="submitBtn">✦ 交给日记 ✦</button>
                        </div>
                        <div class="snake-decoration">🐍</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 工具栏 -->
        <div class="toolbar">
            <button class="tool-btn active-mode" id="btnWrite" title="手写模式">
                <span class="btn-icon">🖊️</span>手写模式
            </button>
            <button class="tool-btn" id="btnType" title="打字模式">
                <span class="btn-icon">⌨️</span>打字模式
            </button>
            <button class="tool-btn" id="btnClear" title="清除书写内容">
                <span class="btn-icon">🧹</span>清除
            </button>
            <button class="tool-btn" id="btnReset" title="重置日记">
                <span class="btn-icon">🔄</span>重置日记
            </button>
        </div>
    </div>

    <!-- 墨水瓶装饰 -->
    <div class="inkwell"></div>

    <script>
        (function() {
            // ==================== DOM元素 ====================
            const canvasContainer = document.getElementById('canvasContainer');
            const writingCanvas = document.getElementById('writingCanvas');
            const particleCanvas = document.getElementById('particleCanvas');
            const canvasHint = document.getElementById('canvasHint');
            const responseText = document.getElementById('responseText');
            const responseArea = document.getElementById('responseArea');
            const textInputArea = document.getElementById('textInputArea');
            const textInput = document.getElementById('textInput');
            const submitBtn = document.getElementById('submitBtn');
            const btnWrite = document.getElementById('btnWrite');
            const btnType = document.getElementById('btnType');
            const btnClear = document.getElementById('btnClear');
            const btnReset = document.getElementById('btnReset');
            const bgParticlesContainer = document.getElementById('bgParticles');
            const pageLeft = document.getElementById('pageLeft');

            const ctx = writingCanvas.getContext('2d');
            const pctx = particleCanvas.getContext('2d');

            // ==================== 状态管理 ====================
            let currentMode = 'write'; // 'write' | 'type'
            let isDrawing = false;
            let lastX = 0;
            let lastY = 0;
            let lastTime = 0;
            let inactivityTimer = null;
            let disappearTimeout = null;
            const INACTIVITY_DELAY = 3500; // 停止书写后3.5秒文字消失
            const RESPONSE_DELAY = 1500; // 文字消失后1.5秒回复
            let interactionCount = 0; // 交互计数（用于彩蛋）
            let isDisappearing = false;
            let particles = [];
            let animationId = null;
            let responseVisible = false;

            // ==================== Canvas初始化 ====================
            function resizeCanvases() {
                const rect = canvasContainer.getBoundingClientRect();
                const dpr = Math.min(window.devicePixelRatio || 1, 2);
                const width = rect.width;
                const height = rect.height;

                // 调整书写Canvas
                if (writingCanvas.width !== width * dpr || writingCanvas.height !== height * dpr) {
                    // 保存当前图像
                    const tempCanvas = document.createElement('canvas');
                    tempCanvas.width = writingCanvas.width;
                    tempCanvas.height = writingCanvas.height;
                    const tempCtx = tempCanvas.getContext('2d');
                    tempCtx.drawImage(writingCanvas, 0, 0);

                    writingCanvas.width = width * dpr;
                    writingCanvas.height = height * dpr;
                    writingCanvas.style.width = width + 'px';
                    writingCanvas.style.height = height + 'px';
                    ctx.scale(dpr, dpr);
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    ctx.strokeStyle = '#1a1410';
                    ctx.lineWidth = 2.2;

                    // 恢复图像
                    ctx.drawImage(tempCanvas, 0, 0, tempCanvas.width, tempCanvas.height, 0, 0, width, height);
                }

                // 调整粒子Canvas
                if (particleCanvas.width !== width * dpr || particleCanvas.height !== height * dpr) {
                    particleCanvas.width = width * dpr;
                    particleCanvas.height = height * dpr;
                    particleCanvas.style.width = width + 'px';
                    particleCanvas.style.height = height + 'px';
                }
            }

            function getCanvasPos(e) {
                const rect = writingCanvas.getBoundingClientRect();
                return {
                    x: (e.clientX - rect.left),
                    y: (e.clientY - rect.top)
                };
            }

            function getTouchPos(e) {
                const rect = writingCanvas.getBoundingClientRect();
                const touch = e.touches[0];
                return {
                    x: (touch.clientX - rect.left),
                    y: (touch.clientY - rect.top)
                };
            }

            // ==================== 笔触速度感应 ====================
            function getAdjustedLineWidth(currentX, currentY, prevX, prevY, prevTime) {
                const now = Date.now();
                const dt = now - prevTime;
                if (dt === 0 || prevTime === 0) return 2.4;
                const dist = Math.sqrt((currentX - prevX) ** 2 + (currentY - prevY) ** 2);
                const speed = dist / dt; // px/ms
                // 速度快线条细，速度慢线条粗
                const baseWidth = 2.6;
                const minWidth = 1.4;
                const maxWidth = 3.8;
                const adjusted = baseWidth - speed * 1.5;
                return Math.max(minWidth, Math.min(maxWidth, adjusted));
            }

            // ==================== 手写功能 ====================
            function startDrawing(e) {
                if (currentMode !== 'write') return;
                if (isDisappearing) return;
                e.preventDefault();
                const pos = (e.type === 'touchstart') ? getTouchPos(e) : getCanvasPos(e);
                isDrawing = true;
                lastX = pos.x;
                lastY = pos.y;
                lastTime = Date.now();
                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y);
                // 起始点画一个小圆点
                ctx.fillStyle = '#1a1410';
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, 1.1, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y);
                canvasContainer.classList.add('writing');
                canvasHint.style.opacity = '0.15';
                clearTimeout(disappearTimeout);
                clearTimeout(inactivityTimer);
                if (responseVisible) {
                    hideResponse();
                }
            }

            function draw(e) {
                if (!isDrawing || currentMode !== 'write') return;
                if (isDisappearing) return;
                e.preventDefault();
                const pos = (e.type === 'touchmove') ? getTouchPos(e) : getCanvasPos(e);
                const adjustedWidth = getAdjustedLineWidth(pos.x, pos.y, lastX, lastY, lastTime);
                ctx.lineWidth = adjustedWidth;
                ctx.strokeStyle = '#1a1410';
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                // 添加微弱的阴影模拟墨水渗透
                ctx.shadowColor = 'rgba(20, 10, 5, 0.3)';
                ctx.shadowBlur = adjustedWidth * 0.7;
                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();
                ctx.shadowColor = 'transparent';
                ctx.shadowBlur = 0;
                lastX = pos.x;
                lastY = pos.y;
                lastTime = Date.now();
            }

            function stopDrawing(e) {
                if (!isDrawing) return;
                isDrawing = false;
                ctx.shadowColor = 'transparent';
                ctx.shadowBlur = 0;
                canvasContainer.classList.remove('writing');
                canvasHint.style.opacity = '0.4';
                lastTime = 0;
                // 检查canvas是否有内容
                if (hasCanvasContent()) {
                    startInactivityTimer();
                }
            }

            function hasCanvasContent() {
                const dpr = Math.min(window.devicePixelRatio || 1, 2);
                const imageData = ctx.getImageData(0, 0, writingCanvas.width, writingCanvas.height);
                const pixels = imageData.data;
                // 检查是否有非透明像素（alpha > 10）
                for (let i = 3; i < pixels.length; i += 4) {
                    if (pixels[i] > 10) return true;
                }
                return false;
            }

            function startInactivityTimer() {
                clearTimeout(inactivityTimer);
                clearTimeout(disappearTimeout);
                inactivityTimer = setTimeout(() => {
                    if (!isDrawing && hasCanvasContent() && !isDisappearing) {
                        triggerDisappear();
                    }
                }, INACTIVITY_DELAY);
            }

            // ==================== 文字消失动画 ====================
            function triggerDisappear() {
                if (isDisappearing) return;
                if (!hasCanvasContent() && currentMode === 'write') return;
                isDisappearing = true;
                clearTimeout(disappearTimeout);
                clearTimeout(inactivityTimer);

                if (currentMode === 'write') {
                    // 获取canvas图像用于粒子
                    const dpr = Math.min(window.devicePixelRatio || 1, 2);
                    const imageData = ctx.getImageData(0, 0, writingCanvas.width, writingCanvas.height);
                    spawnInkParticles(imageData);
                    // 淡出canvas
                    animateCanvasFadeOut(() => {
                        clearCanvas();
                        isDisappearing = false;
                        canvasHint.style.opacity = '0.7';
                        interactionCount++;
                        checkEasterEgg();
                        scheduleResponse();
                    });
                } else if (currentMode === 'type') {
                    // 打字模式的文字消失（从textarea提交的文字）
                    spawnTextParticles();
                    setTimeout(() => {
                        isDisappearing = false;
                        interactionCount++;
                        checkEasterEgg();
                        scheduleResponse();
                    }, 800);
                }
            }

            function animateCanvasFadeOut(callback) {
                const dpr = Math.min(window.devicePixelRatio || 1, 2);
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = writingCanvas.width;
                tempCanvas.height = writingCanvas.height;
                const tempCtx = tempCanvas.getContext('2d');
                tempCtx.drawImage(writingCanvas, 0, 0);
                clearCanvas();

                let opacity = 1;
                const fadeStep = () => {
                    opacity -= 0.06;
                    if (opacity <= 0) {
                        ctx.clearRect(0, 0, writingCanvas.width / dpr, writingCanvas.height / dpr);
                        if (callback) callback();
                        return;
                    }
                    ctx.clearRect(0, 0, writingCanvas.width / dpr, writingCanvas.height / dpr);
                    ctx.globalAlpha = opacity;
                    ctx.drawImage(tempCanvas, 0, 0, writingCanvas.width, writingCanvas.height, 0, 0, writingCanvas
                        .width / dpr, writingCanvas.height / dpr);
                    ctx.globalAlpha = 1;
                    requestAnimationFrame(fadeStep);
                };
                requestAnimationFrame(fadeStep);
            }

            function clearCanvas() {
                const dpr = Math.min(window.devicePixelRatio || 1, 2);
                ctx.clearRect(0, 0, writingCanvas.width / dpr, writingCanvas.height / dpr);
                ctx.globalAlpha = 1;
            }

            function spawnInkParticles(imageData) {
                const dpr = Math.min(window.devicePixelRatio || 1, 2);
                const width = writingCanvas.width / dpr;
                const height = writingCanvas.height / dpr;
                const pixels = imageData.data;
                const sampledParticles = [];
                // 采样暗色像素
                const step = 6;
                for (let y = 0; y < writingCanvas.height; y += step) {
                    for (let x = 0; x < writingCanvas.width; x += step) {
                        const idx = (y * writingCanvas.width + x) * 4;
                        const alpha = pixels[idx + 3];
                        const brightness = (pixels[idx] + pixels[idx + 1] + pixels[idx + 2]) / 3;
                        if (alpha > 30 && brightness < 180) {
                            sampledParticles.push({
                                x: x / dpr,
                                y: y / dpr,
                                alpha: alpha / 255,
                                brightness: brightness,
                            });
                        }
                    }
                }
                // 限制粒子数量
                const maxParticles = 300;
                const selectedParticles = sampledParticles
                    .sort(() => Math.random() - 0.5)
                    .slice(0, maxParticles);

                // 计算中心点
                const cx = width / 2;
                const cy = height / 2;

                selectedParticles.forEach(p => {
                    const angle = Math.atan2(p.y - cy, p.x - cx);
                    const dist = Math.sqrt((p.x - cx) ** 2 + (p.y - cy) ** 2);
                    particles.push({
                        x: p.x,
                        y: p.y,
                        vx: -Math.cos(angle) * (0.5 + Math.random() * 1.8),
                        vy: -Math.sin(angle) * (0.5 + Math.random() * 1.8),
                        life: 1,
                        decay: 0.012 + Math.random() * 0.03,
                        size: 1 + Math.random() * 3.5,
                        color: Math.random() < 0.3 ?
                            `rgba(30,180,100,${p.alpha})` :
                            `rgba(15,8,5,${p.alpha})`,
                    });
                });
                // 添加一些绿色魔法粒子
                for (let i = 0; i < 40; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const dist = 20 + Math.random() * 80;
                    particles.push({
                        x: cx + Math.cos(angle) * dist,
                        y: cy + Math.sin(angle) * dist,
                        vx: -Math.cos(angle) * (1 + Math.random() * 2.5),
                        vy: -Math.sin(angle) * (1 + Math.random() * 2.5),
                        life: 1,
                        decay: 0.015 + Math.random() * 0.025,
                        size: 2 + Math.random() * 5,
                        color: `rgba(${30 + Math.random()*60},${180 + Math.random()*75},${80 + Math.random()*100},0.9)`,
                    });
                }
                if (!animationId) {
                    animateParticles();
                }
            }

            function spawnTextParticles() {
                const rect = textInputArea.getBoundingClientRect();
                const containerRect = canvasContainer.getBoundingClientRect();
                const cx = (rect.left - containerRect.left) + rect.width / 2;
                const cy = (rect.top - containerRect.top) + rect.height / 2;
                const width = containerRect.width;
                const height = containerRect.height;
                for (let i = 0; i < 80; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const dist = 30 + Math.random() * 100;
                    particles.push({
                        x: cx + Math.cos(angle) * dist * 0.3,
                        y: cy + Math.sin(angle) * dist * 0.3,
                        vx: -Math.cos(angle) * (0.8 + Math.random() * 2),
                        vy: -Math.sin(angle) * (0.8 + Math.random() * 2),
                        life: 1,
                        decay: 0.02 + Math.random() * 0.03,
                        size: 2 + Math.random() * 4,
                        color: Math.random() < 0.35 ?
                            `rgba(40,200,110,0.8)` :
                            `rgba(20,10,5,0.7)`,
                    });
                }
                if (!animationId) {

                }
            }

            function animateParticles() {
                const dpr = Math.min(window.devicePixelRatio || 1, 2);
                pctx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
                const scaleX = particleCanvas.width / (particleCanvas.width / dpr);
                const scaleY = particleCanvas.height / (particleCanvas.height / dpr);

                let allDead = true;
                particles = particles.filter(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life -= p.decay;
                    if (p.life <= 0) return false;
                    allDead = false;
                    pctx.fillStyle = p.color.replace(/[\d.]+\)$/, `${Math.min(1, p.life * 0.8)})`);
                    pctx.beginPath();
                    pctx.arc(p.x * dpr, p.y * dpr, p.size * dpr * p.life, 0, Math.PI * 2);
                    pctx.fill();
                    // 发光效果
                    if (p.color.includes('180') || p.color.includes('200') || p.color.includes('green')) {
                        pctx.fillStyle = p.color.replace(/[\d.]+\)$/, `${Math.min(0.5, p.life * 0.3)})`);
                        pctx.beginPath();
                        pctx.arc(p.x * dpr, p.y * dpr, p.size * dpr * p.life * 2.5, 0, Math.PI * 2);
                        pctx.fill();
                    }
                    return true;
                });

                if (allDead) {
                    particles = [];
                    pctx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
                    animationId = null;
                    return;
                }
                animationId = requestAnimationFrame(animateParticles);
            }

                }
                bgParticlesContainer.appendChild(fragment);
            }

            // ==================== 事件监听 ====================
            function bindEvents() {
                // 手写事件
                writingCanvas.addEventListener('mousedown', startDrawing);
                writingCanvas.addEventListener('mousemove', draw);
                writingCanvas.addEventListener('mouseup', stopDrawing);
                writingCanvas.addEventListener('mouseleave', stopDrawing);
                writingCanvas.addEventListener('touchstart', startDrawing, { passive: false });
                writingCanvas.addEventListener('touchmove', draw, { passive: false });
                writingCanvas.addEventListener('touchend', stopDrawing);
                writingCanvas.addEventListener('touchcancel', stopDrawing);

                // 打字事件
                textInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        submitTextInput();
                    }
                });
                submitBtn.addEventListener('click', submitTextInput);

                // 模式切换
                btnWrite.addEventListener('click', switchToWriteMode);
                btnType.addEventListener('click', switchToTypeMode);

                // 清除与重置
                btnClear.addEventListener('click', clearAll);
                btnReset.addEventListener('click', resetDiary);

                // 窗口大小调整
                window.addEventListener('resize', () => {
                    resizeCanvases();
                });

                // 双击左页清除回复
                pageLeft.addEventListener('dblclick', () => {
                    if (responseVisible) {
                        hideResponse();
                    }
                });
            }

            // ==================== 初始化 ====================
            function init() {
                resizeCanvases();
                createBgParticles();
                bindEvents();
                // 初始模式：手写
                switchToWriteMode();
                // 初始欢迎
                setTimeout(() => {
                    showResponse("你好……\n我是汤姆·里德尔。\n在这本日记里写下你的想法吧。");
                }, 800);
                // 初始canvas hint
                canvasHint.style.opacity = '0.7';
            }

            // 页面加载完成后初始化
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

            // ==================== 导出调试接口 ====================
            if (typeof window !== 'undefined') {
                window.diaryAPI = {
                    clearAll,
                    resetDiary,
                    switchToWriteMode,
                    switchToTypeMode,
                    getState: () => ({
                        mode: currentMode,
                        interactionCount,
                        isDisappearing,
                        responseVisible,
                        particlesCount: particles.length,
                    }),
                };
            }

            console.log('%c🐍 汤姆·里德尔的日记已就绪 %c| %c小心你写下的每一个字...',
                'color: #2ecc71; font-size: 16px;',
                '',
                'color: #888; font-style: italic;');
            console.log('%c💡 提示：%c手写模式下在右页书写，停止3.5秒后字迹会被日记吸收。\n   打字模式下输入文字后点击"交给日记"按钮。\n   与日记互动5次后会触发特殊彩蛋...',
                'color: #c9a050;',
                'color: #aaa;');
        })();
    </script>
</body>
